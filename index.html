<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mạch Máu Quốc Gia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/style.css">
    <script type="module" src="./src/main.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-between transition-colors duration-500 relative" 
      :class="{ 'heartbeat-red': $store.game.gameStarted && ($store.game.satisfaction < 30 || $store.game.budget < 30 || $store.game.stability < 30) && !$store.game.gameOver && !$store.game.viewingHistory && !$store.game.reviewMode }" 
      x-data="gameData">
    <!-- Background overlay -->
    <div class="fixed inset-0 z-0 opacity-20 pointer-events-none" style="background-image: url('./src/assets/bg_main.png'); background-size: cover; background-position: center;"></div>

    <!-- Màn hình Welcome -->
    <template x-if="!$store.game.gameStarted">
        <main class="flex-1 flex flex-col justify-center items-center max-w-md w-full mx-auto h-full px-4 relative z-10 animate-[fadeIn_0.5s_ease-out]">
            <div class="w-full bg-gray-800/95 backdrop-blur-md p-8 sm:p-10 rounded-[2rem] border border-gray-700/50 shadow-2xl space-y-8 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-amber-400 via-orange-500 to-red-500"></div>
                <div class="w-20 h-20 mx-auto bg-gray-900 rounded-2xl flex items-center justify-center border border-gray-700 shadow-inner rotate-3">
                    <span class="text-4xl">⚡</span>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-gray-300 tracking-widest uppercase mb-1">Mạch Máu</h1>
                    <h2 class="text-3xl sm:text-4xl font-black text-amber-500 tracking-wider uppercase drop-shadow-md">Quốc Gia</h2>
                </div>
                
                <div class="space-y-6 text-left mt-8" x-data="{ inputName: '', inputRole: 'Bộ trưởng Bộ Năng lượng' }">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Tên Nhóm / Họ Tên</label>
                        <input type="text" x-model="inputName" placeholder="Nhập tên nhóm của bạn..." 
                            class="w-full bg-gray-900/80 border border-gray-600 rounded-xl px-4 py-3.5 text-gray-100 font-medium focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all placeholder-gray-500 shadow-inner">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Chức Vụ</label>
                        <select x-model="inputRole" 
                            class="w-full bg-gray-900/80 border border-gray-600 rounded-xl px-4 py-3.5 text-gray-100 font-medium focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all cursor-pointer shadow-inner">
                            <option value="Bộ trưởng Bộ Năng lượng">Bộ trưởng Bộ Năng lượng</option>
                            <option value="CEO Tập đoàn Điện lực">CEO Tập đoàn Điện lực</option>
                        </select>
                    </div>
                    <button @click="$store.game.startGame(inputName, inputRole)" :disabled="!inputName.trim()" 
                        class="w-full bg-amber-500 hover:bg-amber-600 text-gray-900 font-black uppercase tracking-wider px-6 py-4 rounded-xl transition-all mt-8 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed shadow-[0_0_15px_rgba(245,158,11,0.3)] hover:shadow-[0_0_25px_rgba(245,158,11,0.5)]">
                        Nhậm Chức Nhiệm Kỳ
                    </button>
                    

                    <button @click="$store.game.showLeaderboard = true"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold uppercase tracking-wider px-6 py-3.5 rounded-xl transition-all mt-4 active:scale-95 border border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                        🏆 Bảng Xếp Hạng Lớp Học
                    </button>
                </div>
            </div>
        </main>
    </template>

    <!-- Màn hình Game -->
    <template x-if="$store.game.gameStarted">
        <div class="flex-1 flex flex-col h-full w-full relative z-10 p-4 max-w-6xl mx-auto">
            
            <!-- Header Nhắc nhở Vai trò & Thanh Trạng Thái -->
            <div class="w-full mx-auto mt-2 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
                <span class="text-[11px] sm:text-xs text-gray-300 bg-gray-800/90 px-5 py-2.5 rounded-full border border-gray-700 shadow-sm inline-block tracking-wide font-medium">
                    Đang điều hành: <span class="text-amber-400 font-bold" x-text="$store.game.role + ' ' + $store.game.playerName"></span>
                </span>
                
                <!-- Progress Bars (Horizontal on Desktop) -->
                <div class="w-full md:w-auto flex-1 max-w-2xl flex flex-col sm:flex-row gap-3 sm:gap-4 bg-gray-800/95 backdrop-blur p-3 sm:p-4 rounded-2xl shadow-lg border border-gray-700/50">
                    <div class="flex-1">
                        <div class="flex justify-between text-[10px] sm:text-xs mb-1.5 font-medium text-gray-300">
                            <span>💰 Ngân sách</span>
                            <span class="font-bold text-gray-100" x-text="$store.game.budget + '%'"></span>
                        </div>
                        <div class="w-full bg-gray-900 h-2 sm:h-2.5 rounded-full transition-shadow duration-300" :class="{ 'glow-green': $store.game.budget > 70 }">
                            <div class="bg-emerald-500 h-full rounded-full transition-all duration-300 shadow-[inset_0_-2px_4px_rgba(0,0,0,0.4)]" :style="`width: ${$store.game.budget}%`"></div>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between text-[10px] sm:text-xs mb-1.5 font-medium text-gray-300">
                            <span>❤️ Lòng dân</span>
                            <span class="font-bold text-gray-100" x-text="$store.game.satisfaction + '%'"></span>
                        </div>
                        <div class="w-full bg-gray-900 h-2 sm:h-2.5 rounded-full transition-shadow duration-300" :class="{ 'glow-green': $store.game.satisfaction > 70 }">
                            <div class="bg-blue-500 h-full rounded-full transition-all duration-300 shadow-[inset_0_-2px_4px_rgba(0,0,0,0.4)]" :style="`width: ${$store.game.satisfaction}%`"></div>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between text-[10px] sm:text-xs mb-1.5 font-medium text-gray-300">
                            <span>⚡ Lưới điện</span>
                            <span class="font-bold text-gray-100" x-text="$store.game.stability + '%'"></span>
                        </div>
                        <div class="w-full bg-gray-900 h-2 sm:h-2.5 rounded-full transition-shadow duration-300" :class="{ 'glow-green': $store.game.stability > 70 }">
                            <div class="bg-amber-500 h-full rounded-full transition-all duration-300 shadow-[inset_0_-2px_4px_rgba(0,0,0,0.4)]" :style="`width: ${$store.game.stability}%`"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Layout Grid -->
            <main class="flex-1 flex flex-col lg:flex-row justify-center items-stretch lg:items-start w-full mx-auto mt-6 mb-4 gap-8 lg:gap-12 h-full max-w-[1500px]">
                
                <!-- Cột Trái: Tình huống (Thẻ bài chính) -->
                <template x-if="!$store.game.gameOver && !$store.game.viewingHistory">
                    <div class="w-full lg:w-1/2 flex flex-col space-y-4 max-w-md mx-auto lg:max-w-none">
                        <template x-if="currentScenario">
                            <div class="bg-gray-800/95 backdrop-blur rounded-[2.5rem] overflow-hidden shadow-2xl border border-gray-700 flex flex-col card-animate h-full"
                                :class="{
                                    'swipe-left': swipeDirection === 'left',
                                    'swipe-right': swipeDirection === 'right',
                                    'card-enter': swipeDirection === 'enter'
                                 }">
                                <div class="w-full aspect-square md:aspect-auto md:h-80 lg:h-[500px] relative">
                                    <img :src="currentScenario.image" alt="Scenario Image" class="absolute inset-0 w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/30 to-transparent"></div>
                                    <div class="absolute top-6 left-6 right-6 text-center">
                                        <span class="inline-block text-[13px] sm:text-base font-black px-6 py-2.5 rounded-full bg-gray-900/90 border border-amber-500/50 uppercase tracking-widest text-amber-400 shadow-lg leading-snug"
                                            x-text="currentScenario.title"></span>
                                    </div>
                                </div>
                                <div class="p-8 lg:p-12 flex-1 flex items-center justify-center bg-gray-800 relative">
                                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-500/50 to-transparent"></div>
                                    <p class="text-lg lg:text-2xl font-medium leading-relaxed text-gray-100 text-center"
                                        x-text="currentScenario.situation"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Cột Phải: Các Lựa chọn -->
                <template x-if="!$store.game.gameOver && !$store.game.viewingHistory">
                    <div class="w-full lg:w-1/2 flex flex-col space-y-4 relative justify-center min-h-[500px]">
                        
                        <!-- 3 Thẻ bài Lựa chọn -->
                        <template x-if="currentScenario">
                            <div class="flex flex-col gap-4 lg:gap-5 h-full pb-4 justify-center">
                                <template x-for="(option, index) in currentScenario.options">
                                    <button @click="handleChoice(option, index)" :disabled="isAnimating || $store.game.reviewMode"
                                        class="w-full text-left rounded-3xl active:scale-95 transition-all duration-300 shadow-[0_8px_30px_rgba(0,0,0,0.3)] flex flex-col sm:flex-row overflow-hidden border border-gray-700 bg-gray-800/95 hover:bg-gray-700 group disabled:opacity-50 disabled:cursor-not-allowed hover:-translate-y-1 relative"
                                        :class="{ 'ring-4 ring-amber-500 shadow-[0_0_30px_rgba(245,158,11,0.6)] !border-amber-500': $store.game.reviewMode && $store.game.displayHistory[$store.game.reviewStep]?.choiceLetter === ['A', 'B', 'C'][index] }">
                                        
                                        <!-- Nửa trái (hoặc trên Mobile): Ảnh Option -->
                                        <div class="w-full sm:w-2/5 lg:w-1/3 h-40 sm:h-auto min-h-[160px] relative overflow-hidden bg-gray-900 flex-shrink-0">
                                            <img :src="option.image || currentScenario.image" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-90 transition-opacity duration-500 group-hover:scale-105 filter saturate-50 group-hover:saturate-100">
                                            <div class="absolute inset-0 bg-gradient-to-t sm:bg-gradient-to-r from-gray-800 via-gray-800/40 to-transparent"></div>
                                            <div class="absolute bottom-4 left-4 sm:top-4 sm:left-4 sm:bottom-auto flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center font-black text-xl shadow-[0_0_15px_rgba(0,0,0,0.5)] bg-gray-900 border-2 group-hover:border-amber-500 transition-colors duration-300 z-10"
                                                :class="index === 0 ? 'text-amber-400 border-amber-500/30' : (index === 1 ? 'text-blue-400 border-blue-500/30' : 'text-emerald-400 border-emerald-500/30')"
                                                x-text="['A', 'B', 'C'][index]">
                                            </div>
                                        </div>
                                        
                                        <!-- Nửa phải (hoặc dưới Mobile): Text Option -->
                                        <div class="p-5 lg:p-6 flex-1 flex items-center bg-gray-800 relative z-10 border-t sm:border-t-0 sm:border-l border-gray-700">
                                            <div class="flex-1 text-[15px] sm:text-base lg:text-lg font-medium leading-relaxed text-gray-300 group-hover:text-white transition-colors"
                                                x-text="option.text.replace(/^[A-C]\.\s*/, '')"></div>
                                        </div>
                                        
                                        <!-- Glow border effect on hover -->
                                        <div class="absolute inset-0 border-2 border-transparent group-hover:border-amber-500/50 rounded-3xl transition-colors duration-300 pointer-events-none"></div>
                                    </button>
                                </template>
                            </div>
                        </template>
                        <template x-if="$store.game.reviewMode">
                            <button @click="$store.game.nextReviewStep()"
                                class="w-full mt-4 bg-blue-500 hover:bg-blue-600 text-white font-black uppercase tracking-wider px-6 py-4 rounded-2xl transition-all shadow-[0_0_15px_rgba(59,130,246,0.5)] hover:shadow-[0_0_25px_rgba(59,130,246,0.7)] active:scale-95 text-lg border-2 border-blue-400">
                                <span x-text="$store.game.reviewStep < $store.game.displayHistory.length - 1 ? 'Tiếp Theo ➡️' : 'Kết Thúc Xem Lại'"></span>
                            </button>
                        </template>
                    </div>
                </template>
            </main>
            <!-- Màn hình Kết cục GameOver & Nhật Ký Biện Hộ -->
            <template x-if="$store.game.gameOver || $store.game.viewingHistory">
                <div class="w-full text-center p-6 md:p-10 bg-gray-800/95 backdrop-blur border-2 border-amber-500/30 rounded-[2.5rem] shadow-[0_0_50px_rgba(0,0,0,0.5)] relative overflow-hidden w-full max-w-6xl mx-auto col-span-full animate-[fadeIn_0.5s_ease-out] mt-6">
                    <!-- Background glow for ending -->
                    <div class="absolute inset-0 opacity-10 pointer-events-none"
                        :class="$store.game.displayEnding.rank <= 3 ? 'bg-emerald-500' : 'bg-red-500'">
                    </div>

                    <div class="relative z-10 max-w-4xl mx-auto space-y-8">
                        <div>
                            <div class="text-5xl sm:text-6xl md:text-7xl mb-6 drop-shadow-xl animate-[bounce_2s_infinite]">
                                <span x-text="$store.game.displayEnding.rank <= 3 ? '🏆' : '💀'"></span>
                            </div>
                            
                            <h2 class="text-3xl sm:text-4xl md:text-5xl font-black text-white mb-6 uppercase tracking-widest drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]"
                                x-text="$store.game.displayEnding.title"></h2>
                            
                            <p class="text-lg sm:text-xl md:text-2xl text-gray-200 mb-8 font-medium leading-relaxed"
                                x-text="$store.game.displayEnding.description"></p>
                        </div>

                        <!-- Nhật ký biện hộ Table -->
                        <div class="mt-12 text-left border-t border-gray-700 pt-10 overflow-x-auto">
                            <h3 class="text-2xl md:text-3xl font-black text-amber-500 mb-6 uppercase tracking-wider text-center">Nhật Ký Biện Hộ</h3>
                            <p class="text-center text-gray-400 mb-8 text-sm md:text-base">Mời nhóm lên trình bày trước lớp về các quyết định lịch sử dưới đây.</p>
                            
                            <table class="w-full text-sm md:text-base text-left text-gray-300 bg-gray-900 rounded-xl overflow-hidden shadow-inner min-w-[800px]">
                                <thead class="text-xs md:text-sm text-gray-400 uppercase bg-gray-800 border-b border-gray-700">
                                    <tr>
                                        <th class="px-4 py-4 text-center w-16">Năm</th>
                                        <th class="px-4 py-4 w-1/4">Tình huống</th>
                                        <th class="px-4 py-4 w-1/4">Lựa chọn của nhóm</th>
                                        <th class="px-4 py-4 w-1/4">Hệ quả thực tế</th>
                                        <th class="px-4 py-4">Lý do chọn (Trình bày)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="history in $store.game.displayHistory">
                                        <tr class="border-b border-gray-800 hover:bg-gray-800/50 transition-colors">
                                            <td class="px-4 py-5 text-center font-bold text-amber-500 text-lg" x-text="Math.ceil(history.step / 3)"></td>
                                            <td class="px-4 py-5 font-medium text-gray-200" x-text="history.situation"></td>
                                            <td class="px-4 py-5">
                                                <span class="inline-block px-2 py-1 bg-gray-800 rounded border border-gray-600 font-bold text-white mr-2 mb-2" x-text="'CHỌN ' + history.choiceLetter"></span>
                                                <span x-text="history.choiceText.replace(/^[A-C]\.\s*/, '')"></span>
                                            </td>
                                            <td class="px-4 py-5 text-gray-400 italic" x-text="history.consequence"></td>
                                            <td class="px-4 py-5">
                                                <div class="w-full h-full min-h-[4rem] border-2 border-dashed border-gray-700 rounded-lg bg-gray-800/30 flex items-center justify-center text-gray-600 text-xs text-center p-2">
                                                    Điền/Thảo luận
                                                </div>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <div class="pt-8">
                            <template x-if="!$store.game.viewingHistory">
                                <div class="space-y-4">
                                    <button @click="$store.game.startReview()"
                                        class="bg-amber-500 hover:bg-amber-600 text-gray-900 font-black uppercase tracking-wider px-12 py-5 rounded-2xl transition-all shadow-[0_0_20px_rgba(245,158,11,0.3)] hover:shadow-[0_0_30px_rgba(245,158,11,0.5)] active:scale-95 text-xl w-full max-w-sm mx-auto block">
                                        Xem Lại Câu Trả Lời
                                    </button>
                                    <button @click="$store.game.goHome()"
                                        class="bg-transparent hover:bg-gray-800 text-gray-400 font-bold uppercase tracking-wider px-8 py-3 rounded-xl transition-all border border-gray-600 active:scale-95 text-sm w-full max-w-sm mx-auto block">
                                        Trở Về Màn Hình Chính
                                    </button>
                                </div>
                            </template>
                            <template x-if="$store.game.viewingHistory">
                                <button @click="$store.game.closeHistory()"
                                    class="bg-gray-700 hover:bg-gray-600 text-gray-100 font-black uppercase tracking-wider px-12 py-5 rounded-2xl transition-all shadow-md active:scale-95 text-xl w-full max-w-sm mx-auto block">
                                    Đóng Báo Cáo
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Popup Giải thích (Feedback) dạng Modal Overlay căn giữa màn hình -->
            <div x-show="$store.game.showPopup" style="display: none;" class="fixed inset-0 z-[100] flex flex-col items-center justify-center space-y-6 text-center animate-[fadeIn_0.3s_ease-out] bg-gray-900/80 backdrop-blur-sm p-4">
                <div class="bg-gray-800 border border-amber-500/50 rounded-[2rem] p-8 sm:p-10 shadow-2xl relative w-full max-w-2xl mx-auto animate-[slideUpFadeIn_0.3s_ease-out]">
                    <div class="absolute -top-5 left-1/2 -translate-x-1/2 bg-amber-500 text-gray-900 font-black px-8 py-2.5 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.4)] text-sm tracking-widest uppercase">
                        Kết Quả Quyết Định
                    </div>
                    <div class="w-16 h-16 mx-auto mb-6 bg-gray-900 rounded-full flex items-center justify-center border border-gray-700 shadow-inner mt-2">
                        <span class="text-2xl">⚖️</span>
                    </div>
                    <p class="text-base sm:text-lg md:text-xl leading-relaxed text-gray-200 whitespace-pre-line text-left font-medium"
                        x-text="$store.game.formattedFeedback"></p>
                </div>

                <button @click="continueNext()"
                    class="bg-amber-500 hover:bg-amber-600 text-gray-900 font-black px-12 py-5 rounded-2xl transition-all shadow-[0_0_20px_rgba(245,158,11,0.3)] hover:shadow-[0_0_30px_rgba(245,158,11,0.5)] active:scale-95 w-full max-w-sm text-lg uppercase tracking-wider animate-[slideUpFadeIn_0.4s_ease-out]">
                    Tiếp Tục Nhiệm Kỳ
                </button>
            </div>

    </template>

    <!-- Modal Bảng Xếp Hạng Lớp Học -->
    <div x-show="$store.game.showLeaderboard" style="display: none;" class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-gray-900/90 backdrop-blur-md p-4 animate-[fadeIn_0.3s_ease-out]">
        <div class="bg-gray-800 border-2 border-blue-500/50 rounded-[2rem] p-6 sm:p-10 shadow-[0_0_50px_rgba(59,130,246,0.2)] relative w-full max-w-5xl mx-auto flex flex-col max-h-[90vh]">
            <button @click="$store.game.showLeaderboard = false" class="absolute top-6 right-6 text-gray-400 hover:text-white text-3xl font-black bg-gray-700 hover:bg-red-500 rounded-full w-12 h-12 flex items-center justify-center transition-colors pb-1">
                &times;
            </button>
            <h2 class="text-3xl sm:text-4xl font-black text-blue-400 uppercase tracking-widest text-center mb-8 drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]">
                🏆 BẢNG XẾP HẠNG LỚP HỌC
            </h2>
            
            <div class="overflow-y-auto flex-1 pr-2 custom-scrollbar">
                <template x-if="$store.game.leaderboard.length === 0">
                    <div class="text-center text-gray-400 py-10 text-xl font-medium">Chưa có nhóm nào hoàn thành nhiệm kỳ.</div>
                </template>
                
                <template x-if="$store.game.leaderboard.length > 0">
                    <table class="w-full text-left text-sm sm:text-base border-collapse">
                        <thead>
                            <tr class="border-b-2 border-blue-500/50 text-blue-300 uppercase tracking-wider text-[11px] sm:text-sm">
                                <th class="pb-4 pl-4 font-black">Thời Gian</th>
                                <th class="pb-4 font-black">Tên Nhóm</th>
                                <th class="pb-4 font-black">Thứ Hạng</th>
                                <th class="pb-4 font-black">Kết Cục</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-700">
                            <template x-for="entry in $store.game.leaderboard" :key="entry.id">
                                <tr class="hover:bg-gray-700/50 transition-colors"
                                    :class="{
                                        'bg-amber-500/10': entry.rank === 1,
                                        'bg-blue-500/10': entry.rank === 2 || entry.rank === 3,
                                        'bg-red-500/10': entry.rank >= 6
                                    }">
                                    <td class="py-4 pl-4 font-mono text-gray-400 text-xs sm:text-sm" x-text="entry.displayTime"></td>
                                    <td class="py-4 font-bold text-gray-100 text-base sm:text-lg" x-text="entry.playerName"></td>
                                    <td class="py-4">
                                        <span class="px-3 py-1 rounded-full text-xs sm:text-sm font-black border"
                                            :class="{
                                                'bg-amber-500 text-gray-900 border-amber-400': entry.rank === 1,
                                                'bg-blue-500 text-white border-blue-400': entry.rank === 2 || entry.rank === 3,
                                                'bg-red-500 text-white border-red-400': entry.rank >= 6,
                                                'bg-gray-600 text-gray-200 border-gray-500': entry.rank === 4 || entry.rank === 5
                                            }" x-text="'Hạng ' + entry.rank"></span>
                                    </td>
                                    <td class="py-4 font-medium text-gray-300"
                                        :class="{ 'text-amber-400': entry.rank === 1, 'text-red-400 font-bold': entry.rank >= 6 }"
                                        x-text="entry.title"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>
            </div>
        </div>
    </div>
</body>
</html>
